<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Course Builder demo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: -apple-system, "Segoe UI", sans-serif;
        background: #0b1020;
        color: #e6e9f5;
        padding: 48px;
        margin: 0;
      }
      h1 {
        color: #7eb6ff;
        margin: 0 0 24px 0;
        font-size: 36px;
      }
      label {
        display: block;
        font-size: 14px;
        color: #9aa3c7;
        margin-bottom: 6px;
      }
      input {
        width: 480px;
        padding: 12px 14px;
        font-size: 18px;
        border: 1px solid #2a3568;
        border-radius: 6px;
        background: #131a3a;
        color: #e6e9f5;
        margin-bottom: 16px;
      }
      button {
        padding: 14px 28px;
        font-size: 18px;
        background: #3a86ff;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background: #5e9bff;
      }
      .result {
        margin-top: 32px;
        padding: 20px;
        background: #131a3a;
        border-left: 5px solid #3a86ff;
        border-radius: 6px;
        min-height: 32px;
        font-size: 18px;
      }
      .result.empty {
        color: #6c7099;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1 data-testid="title">Course Builder demo</h1>
    <label for="topic">Lesson topic</label>
    <input id="topic" data-testid="topic" placeholder="e.g. async iterators" />
    <br />
    <button data-testid="compile" onclick="onCompile()">Compile lesson</button>
    <div class="result empty" id="output" data-testid="output">No lesson compiled yet.</div>
    <script>
      function onCompile() {
        const topic = document.getElementById("topic").value || "(empty topic)";
        const out = document.getElementById("output");
        out.classList.remove("empty");
        out.innerText = "Compiled lesson: " + topic;
      }
    </script>
  </body>
</html>

repo_root: ../..
dirs:
  narration: narration
  audio: audio
  animations: animations
  terminal: terminal
  recordings: recordings
segments:
  default: &id001
  - '01'
  - '02'
  - '03'
  all: *id001
segment_names:
  '01': 01-overview
  '02': 02-init-scaffold
  '03': 03-wizard-gui
visual_map:
  '01':
    type: manim
    scene: _TimedScene
    source: _TimedScene.mp4

# Synced from docs/demos/per-function/lesson-compile.docgen.yaml
# Regenerate: docs/demos/_seed-examples.sh (or _full-reset-regenerate.sh)

# In-repo dogfood manifest exercised by `_rebuild-per-function.sh`.
# Drives Playwright (Chromium) against the sibling lesson-compile.html, then
# renders a slowed clip with per-action TTS narration. The rebuild script
# rewrites the placeholder URL to a real `file://` pointer before invoking
# `docgen demo-function`. Update this fixture whenever the manifest schema
# grows new user-facing fields, and update docs/demo-function.md in lockstep.
identifier: "documentation-generator/dogfood/lesson-compile:onCompile"
intent: "Compile a lesson from a topic input — the canonical per-function dogfood demo."
demonstration:
  kind: playwright
  url: "file://__FIXTURE__/lesson-compile.html"
  actions:
    - kind: wait_for
      selector: '[data-testid="title"]'
      timeout_ms: 5000
      say: "Course Builder loads with an empty lesson form."
    - kind: click
      selector: '[data-testid="topic"]'
      say: "We focus the topic input."
    - kind: type
      selector: '[data-testid="topic"]'
      value: "Async iterators"
      delay_ms: 70
      say: "And type a lesson topic — async iterators in this case."
    - kind: click
      selector: '[data-testid="compile"]'
      say: "Clicking compile runs the lesson generator."
    - kind: wait_for_text
      selector: '[data-testid="output"]'
      text: "Compiled lesson"
      timeout_ms: 5000
      say: "The compiled lesson appears in the result panel."
    - kind: wait
      ms: 1500
output_budget:
  duration_seconds: 25
  resolution: "1280x720"
  playback_speed_factor: 0.7
assertions_to_surface: []

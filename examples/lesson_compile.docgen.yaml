# Per-function demo manifest example for `docgen demo-function`.
#
# Demonstrates:
#   * Per-action narration: `actions[*].say` — one TTS clip per action,
#     synced to the captured timeline of when each action ran.
#   * Slowdown: `output_budget.playback_speed_factor` (0.7 = ~1.4x duration).
#   * Both produce a polished, audio-bearing MP4. See docs/demo-function.md.
identifier: "course-builder/src/lessons/compileLesson.ts:compileLesson"
intent: |
  Compiles a lesson markdown file into structured checkpoints and emits a status badge.
setup:
  fixtures:
    - tests/fixtures/lessons/intro.md
demonstration:
  kind: playwright
  url: "http://127.0.0.1:3000/lessons/new"
  actions:
    - kind: type
      selector: '[data-testid="title"]'
      value: "Intro to TS"
      delay_ms: 30
      say: "We name the lesson — Intro to TS."
    - kind: click
      selector: '[data-testid="compile"]'
      say: "Clicking compile runs the lesson generator."
    - kind: wait_for_text
      selector: '[data-testid="status"]'
      text: "compiled"
      timeout_ms: 10000
      say: "When the status badge flips to compiled the lesson is ready."
    - kind: wait
      ms: 600
assertions_to_surface:
  - "lesson.status === 'compiled'"
  - "checkpoint count = 3"
output_budget:
  duration_seconds: 30
  segments: 1
  resolution: "1280x720"
  # 0.7 = play back at 70% speed, so the visual is ~1.43x longer than the raw
  # recording. Narration clips remain at natural pace and are placed at
  # `t_action / playback_speed_factor` in the slowed timeline.
  playback_speed_factor: 0.7

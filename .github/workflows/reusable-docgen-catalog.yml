# Reusable workflow: docgen catalog gate + optional docgen install (pip from git).
# Caller repo must contain docgen.yaml under `inputs.working-directory`.
#
# Usage from a consumer workflow:
#   jobs:
#     docs:
#       uses: jmjava/documentation-generator/.github/workflows/reusable-docgen-catalog.yml@main
#       with:
#         working-directory: docs/demos
#         docgen-git-ref: ${{ github.sha }}   # or pinned SHA / tag
#       secrets: inherit
#
# Outputs:
#   needs_regen — "true" if `docgen catalog stale` reported work to do, else "false".
#     Caller: `needs.<job_id>.outputs.needs_regen` (e.g. run a regen job when "true").
#
# Optional second job (merge-on-stale): when the catalog is stale, merge Playwright
# discoveries into the catalog and refresh fingerprints (no git commit).

on:
  workflow_call:
    outputs:
      needs_regen:
        description: "true if docgen catalog stale exited non-zero"
        value: ${{ jobs.catalog-stale.outputs.needs_regen }}
    inputs:
      working-directory:
        required: true
        type: string
        description: Directory containing docgen.yaml (e.g. docs/demos).
      docgen-git-ref:
        required: true
        type: string
        description: Git ref (SHA, branch, tag) for pip install of this repo.
      python-version:
        required: false
        type: string
        default: "3.12"
      force-entry-ids:
        required: false
        type: string
        default: ""
        description: Optional comma-separated catalog entry ids (DOCGEN_CATALOG_FORCE_IDS).
      merge-on-stale:
        required: false
        type: boolean
        default: false
        description: When needs_regen is true, run discover-tests --merge-catalog and catalog refresh.

jobs:
  catalog-stale:
    runs-on: ubuntu-latest
    outputs:
      needs_regen: ${{ steps.check.outputs.needs_regen }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install docgen
        run: |
          pip install "docgen @ git+https://github.com/jmjava/documentation-generator.git@${{ inputs.docgen-git-ref }}"

      - name: Ensure catalog file exists
        run: docgen catalog init

      - name: Stale check
        id: check
        env:
          DOCGEN_CATALOG_FORCE_IDS: ${{ inputs.force-entry-ids }}
        run: |
          set +e
          docgen catalog stale --quiet
          code=$?
          set -e
          if [ "$code" -ne 0 ]; then
            echo "needs_regen=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_regen=false" >> "$GITHUB_OUTPUT"
          fi

  catalog-merge-discover:
    needs: catalog-stale
    if: needs.catalog-stale.outputs.needs_regen == 'true' && inputs.merge-on-stale == true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install docgen
        run: |
          pip install "docgen @ git+https://github.com/jmjava/documentation-generator.git@${{ inputs.docgen-git-ref }}"

      - name: Merge discovered Playwright entries and refresh catalog
        env:
          DOCGEN_CATALOG_FORCE_IDS: ${{ inputs.force-entry-ids }}
        run: |
          docgen catalog init
          docgen discover-tests --merge-catalog
          docgen catalog refresh
